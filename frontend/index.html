<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />

    <!-- viewport-fit=cover: il contenuto occupa tutto lo schermo, incluse le aree notch/home indicator -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="description" content="Progetto Armadio — il tuo guardaroba digitale intelligente" />

    <!-- PWA Manifest (Android + desktop) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Theme color: bianco, abbinato all'header -->
    <meta name="theme-color" content="#ffffff" />

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Safari — Add to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- "default": status bar bianca con icone scure, si integra con il nostro header bianco -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Armadio" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Progetto Armadio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
